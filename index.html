    <style>
      @font-face {
        font-family: 'Nunito Sans';

      }

      @font-face {
        font-family: 'Nunito Sans';
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url('./sb-common-assets/nunito-sans-bold.woff2') format('woff2');
      }

      @font-face {
        font-family: 'Nunito Sans';
        font-style: italic;

    <link href="./sb-manager/runtime.js" rel="modulepreload" />

    
    <link href="./sb-addons/storybook-core-server-presets-0/common-manager-bundle.js" rel="modulepreload" />
    
    <link href="./sb-addons/docs-1/manager-bundle.js" rel="modulepreload" />
    
    <link href="./sb-addons/storybook-dark-mode-esm-preset-2/manager-bundle.js" rel="modulepreload" />

      <meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"
/>

<meta
  name="keywords"
  content="design, system, design system, styleguide, style, guide, components, library, pattern, kit, component, cloud, React, React.js"
/>
<meta
  name="description"
  content="@peculiar/react-components"
/>

<!-- Favicon -->
<link
  rel="icon"
  href="./icon.svg"
  type="image/svg+xml"
/>

<!-- Open Graph -->
<meta
  property="og:title"
  content="@peculiar/react-components"
/>
<meta
  property="og:site_name"
  content="@peculiar/react-components"
/>
<meta
  property="og:description"
  content="@peculiar/react-components"
/>
 

    <style>
      #storybook-root[hidden] {
        display: none !important;
      }
    </style>

    
  </head>
  <body>
    <div id="root"></div>

    
    <script>
      
        
          window['FEATURES'] = {
  "actions": true,
  "argTypeTargetsV7": true,
  "backgrounds": true,
  "changeDetection": true,
  "componentsManifest": false,
  "controls": true,
  "disallowImplicitActionsInRenderV8": true,
  "highlight": true,
  "interactions": true,
  "legacyDecoratorFileOrder": false,
  "measure": true,
  "outline": true,
  "sidebarOnboardingChecklist": true,
  "viewport": true
};
        
      
        
          window['REFS'] = {};
        
      
        
          window['LOGLEVEL'] = "info";
        
      
        
          window['DOCS_OPTIONS'] = {
  "defaultName": "Docs"
};
        
      
        
          window['CONFIG_TYPE'] = "PRODUCTION";
        
      
        
      
        
      
        
          window['TAGS_OPTIONS'] = {};
        
      
        
          window['STORYBOOK_BUILDER'] = "vite";
        
      
        
          window['STORYBOOK_FRAMEWORK'] = "react-vite";
        
      
        
          window['STORYBOOK_RENDERER'] = "react";
        
      
        
      
    </script>
    

    <script type="module">
      import './sb-manager/globals-runtime.js';

      
        import './sb-addons/storybook-core-server-presets-0/common-manager-bundle.js';
      
        import './sb-addons/docs-1/manager-bundle.js';
      
        import './sb-addons/storybook-dark-mode-esm-preset-2/manager-bundle.js';
      
        import './sb-addons/storybook-3/manager-bundle.js';
      

      import './sb-manager/runtime.js';
    </script>
